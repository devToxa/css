<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Fetch로 소스코드 불러오기</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            font-family: sans-serif;
        }

        pre {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        pre code {
            display: block;
            padding: 16px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
        }

        .file-name {
            font-weight: bold;
            margin-bottom: 5px;
            color: #58a6ff;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="file-name">📄 ex2-2.html</div>
    <pre><code id="html-code-box" class="language-html">코딩 파일을 불러오는 중...</code></pre>

    <div class="file-name">📄 ex2-2.css</div>
    <pre><code id="css-code-box" class="language-javascript">코딩 파일을 불러오는 중...</code></pre>


    <script>
        // 파일을 읽어와서 특정 박스에 집어넣는 재사용 함수
        async function loadCodeFile(filePath, targetElementId) {
            try {
                // 1. fetch로 파일 데이터 요청
                const response = await fetch(filePath);

                if (!response.ok) {
                    throw new Error(`파일을 불러오는데 실패했습니다. (상태코드: ${response.status})`);
                }

                // 2. 파일 내용을 텍스트 형식으로 변환
                const codeText = await response.text();

                // 3. 데이터를 넣을 대상 <code> 태그 선택
                const codeTarget = document.getElementById(targetElementId);

                // 🌟 중요: innerHTML이 아닌 textContent를 써야 HTML 태그가 실행되지 않고 글자로 안전하게 주입됩니다.
                codeTarget.textContent = codeText;

                // 4. 내용물이 채워진 뒤 Highlight.js 문법 강조 적용
                hljs.highlightElement(codeTarget);

            } catch (error) {
                console.error(error);
                document.getElementById(targetElementId).textContent = `❌ 에러 발생: ${error.message}`;
            }
        }

        // 페이지가 로드되면 파일들을 각각 호출합니다.
        document.addEventListener('DOMContentLoaded', () => {
            // loadCodeFile('실제파일경로', '집어넣을_태그_ID');
            loadCodeFile('../html/ex2-2.html', 'html-code-box');
            loadCodeFile('../css/ex2-2.css', 'css-code-box');
        });
    </script>

</body>

</html>
